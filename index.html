<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Cola Massage | Premium Luxury</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* 1. VARIABLES & RESET */
        :root {
            --gold: #d4a017;
            --gold-light: #f2b600;
            --gold-dark: #b8860b;
            --dark-bg: #0a0a0a;
            --card-bg: rgba(30, 30, 30, 0.85);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            color: #fff;
            overflow-x: hidden;
        }

        /* 2. HERO SECTION & BACKGROUND */
        .hero { 
            position: relative;
            min-height: 100vh;
            /* Creates the dark marble/gold gradient background effect */
            background: radial-gradient(circle at 30% 40%, #3a2c00 0%, #050505 60%, #000000 100%); 
            display: flex;
            align-items: center;
            padding: 0 5%;
            overflow: hidden;
        }

        /* Adds a subtle gold texture line in the background */
        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(45deg, transparent 45%, rgba(212, 160, 23, 0.05) 50%, transparent 55%);
            background-size: 200% 200%;
            z-index: 0;
        }

        /* 3. LOGO CONTAINER (LEFT) */
        .logo-container {
            flex: 0.8;
            z-index: 3;
            display: flex;
            justify-content: center;
        }

        .logo-ring {
            width: 350px; 
            height: 350px;
            border-radius: 50%;
            background: #000;
            /* Creates the metallic gold border and glow */
            border: 12px solid var(--gold);
            box-shadow: 0 0 50px rgba(212, 160, 23, 0.5), inset 0 0 20px rgba(212, 160, 23, 0.3);
            display: flex; 
            align-items: center; 
            justify-content: center;
            position: relative;
        }

        .logo-ring img {
            width: 90%; 
            height: 90%; 
            border-radius: 50%; 
            object-fit: contain;
        }

        /* 4. PREMIUM CONTENT CARD (CENTER) */
        .content-wrapper {
            flex: 1.2;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 20px;
        }

        .premium-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid rgba(212, 160, 23, 0.3);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 550px;
            margin-bottom: 40px;
        }

        .premium-card h2 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .arabic-text {
            font-family: 'Playfair Display', serif;
            color: var(--gold-light);
            font-size: 22px;
            margin-bottom: 15px;
            display: block;
        }

        .premium-card p {
            color: #d1d1d1;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 25px;
            font-weight: 300;
        }

        .btn-book {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 30px;
            background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
            color: #000;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            border-radius: 50px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .btn-book:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(212, 160, 23, 0.4);
        }

        /* 5. SERVICES SECTION (BOTTOM RIGHT INSIDE HERO) */
        .services-header {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 24px;
            margin-bottom: 15px;
            padding-left: 10px;
        }

        .services-grid {
            display: flex;
            gap: 15px;
            max-width: 550px;
        }

        .service-card {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(5px);
            padding: 20px 10px;
            border-radius: 12px;
            border: 1px solid rgba(212, 160, 23, 0.2);
            flex: 1;
            text-align: center;
            transition: 0.3s;
        }

        .service-card:hover {
            border-color: var(--gold);
            background: rgba(40, 40, 40, 0.8);
        }

        .service-card i {
            color: var(--gold);
            font-size: 24px;
            margin-bottom: 10px;
        }

        .service-card h3 {
            font-size: 13px;
            font-weight: 400;
            color: #fff;
            letter-spacing: 0.5px;
        }

        /* 6. MODEL IMAGE OVERLAY (RIGHT) */
        .babae-overlay {
            position: absolute;
            right: -5%;
            bottom: 0;
            height: 95%;
            z-index: 1;
            object-fit: cover;
            /* Fades the left edge of the image into the background */
            mask-image: linear-gradient(to right, transparent 0%, black 30%);
            -webkit-mask-image: linear-gradient(to right, transparent 0%, black 30%);
            opacity: 0.85;
            pointer-events: none;
        }

        /* 7. RESPONSIVE DESIGN FOR MOBILE */
        @media (max-width: 992px) {
            .hero {
                flex-direction: column;
                justify-content: center;
                padding: 100px 5% 50px;
            }
            .babae-overlay {
                opacity: 0.3; /* Make model faint on small screens */
                right: 0;
            }
            .logo-ring {
                width: 250px; height: 250px;
                margin-bottom: 40px;
            }
            .content-wrapper {
                padding-left: 0;
                align-items: center;
                text-align: center;
            }
            .premium-card {
                padding: 30px;
            }
        }
        
        @media (max-width: 600px) {
            .services-grid {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="logo-container">
            <div class="logo-ring">
                <img src="Logo.png" alt="Sweet Cola Massage Logo">
            </div>
        </div>

        <div class="content-wrapper">
            
            <div class="premium-card">
                <h2>The Premium Package:<br>4-in-1 Luxury Ritual</h2>
                <span class="arabic-text">سويت كولا مساج</span>
                <p>Forget the stress of the city for a moment. Four high-end services seamless session of pure indulgence and aura.</p>
                
                <a href="https://wa.me/966560958973" class="btn-book" target="_blank" rel="noopener noreferrer">
                    <i class="fas fa-hand-pointer"></i> Book Now / احجز الآن
                </a>
            </div>

            <h3 class="services-header">Our Professional Services</h3>
            <div class="services-grid">
                <div class="service-card">
                    <i class="fas fa-spa"></i>
                    <h3>Sweet Cola</h3>
                </div>
                <div class="service-card">
                    <i class="fas fa-hands"></i>
                    <h3>Hessy Therapy</h3>
                </div>
                <div class="service-card">
                    <i class="fas fa-leaf"></i>
                    <h3>Ellnit Services</h3>
                </div>
            </div>

        </div>

        <img src="image_16.png" alt="Luxury Spa Model" class="babae-overlay">
    </section>

</body>
</html>
