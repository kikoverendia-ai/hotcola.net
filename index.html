<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Cola Massage In Riyadh</title>

    <link rel="icon" type="image/png" href="Logo_02.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --gold-text: #cca243;
            --yellow-btn: #e6b012;
            --dark-card: #0a0a0a;
            --gold: #d4a017;
            --gold-bright: #f2b600;
            --pure-gold: #FFD700;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-image: url('Background_01.jpg');
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            background-color: #000; 
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 200px 5% 100px 5%; 
        }

        /* 1. FIXED HEADER BANNER */
        .header-banner {
            position: fixed;
            top: 0; left: 0; width: 100%;
            background: rgba(8, 8, 8, 0.95);
            border-bottom: 2px solid var(--gold);
            padding: 20px 5%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 100;
        }

        .header-banner h2 { 
            font-family: 'Playfair Display', serif; 
            color: var(--gold-bright); 
            font-size: 32px; 
            font-weight: 900;
            margin-bottom: 8px; 
            text-shadow: 0 0 15px rgba(242, 182, 0, 0.4);
        }

        .arabic-text-header { 
            font-size: 13px; color: var(--gold-text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
            width: 85%; margin: 0 auto 5px auto;
        }

        /* 2. MAIN CONTENT LAYOUT */
        .main-content {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            max-width: 1300px;
            margin: 0 auto;
            gap: 50px;
            position: relative;
            z-index: 3;
        }

        /* 3. ANIMATED LOGO RING (FIXED SIZE) */
        .logo-container { flex-shrink: 0; position: sticky; top: 200px; }
        .logo-ring {
            width: 420px; height: 420px;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 50px rgba(230, 176, 18, 0.3);
        }

        .logo-ring::before {
            content: '';
            position: absolute;
            width: 150%; height: 150%;
            background: conic-gradient(transparent, var(--pure-gold), transparent 30%);
            animation: spin 3s linear infinite;
        }

        .logo-ring::after {
            content: '';
            position: absolute;
            inset: 8px;
            background: #000;
            border-radius: 50%;
            z-index: 1;
        }

        .logo-ring img {
            width: 90%; height: 90%;
            border-radius: 50%;
            object-fit: contain;
            position: relative;
            z-index: 2;
        }

        /* 4. SERVICES GRID */
        .services-section { flex: 1; max-width: 700px; }
        .services-header { 
            font-family: 'Playfair Display', serif; 
            color: var(--gold-bright); 
            font-size: 26px; 
            margin-bottom: 30px; 
            text-align: center;
        }

        .booking-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
        }

        .service-card {
            position: relative;
            background: var(--dark-card); 
            padding: 25px 15px; 
            border-radius: 20px; 
            text-decoration: none; 
            color: #fff;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden; transition: 0.3s; text-align: center;
        }

        .service-card::before {
            content: ''; position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, var(--gold), transparent 30%);
            animation: spin 4s linear infinite;
        }

        .service-card::after {
            content: ''; position: absolute;
            inset: 3px; background: var(--dark-card);
            border-radius: 17px; z-index: 1;
        }

        .card-content { position: relative; z-index: 2; width: 100%; }
        .service-card i { font-size: 28px; color: var(--gold); margin-bottom: 10px; }
        .service-card h3 { font-family: 'Playfair Display', serif; font-size: 19px; margin-bottom: 5px; }
        .service-card .arabic-title { font-size: 15px; color: var(--gold); font-weight: bold; display: block; margin-bottom: 10px; }
        .service-card p { font-size: 12px; color: #bbb; margin-bottom: 15px; line-height: 1.4; }

        .price-btn { 
            background: #000; color: var(--gold-bright); 
            padding: 10px 20px; border-radius: 50px; 
            font-weight: 700; font-size: 13px;
            border: 1px solid #333; transition: 0.3s;
        }
        .service-card:hover { transform: translateY(-5px); }
        .service-card:hover .price-btn { border-color: var(--gold); background: #111; }

        .premium-card { grid-column: span 2; padding: 35px; }
        .premium-card::before { background: conic-gradient(transparent, #fff, transparent 30%); }
        .premium-card::after { background: var(--gold); }
        .premium-card .card-content * { color: #000 !important; }
        .premium-card .price-btn { background: #000 !important; color: #fff !important; }

        /* 5. LOCATION MAP SECTION */
        .map-section {
            max-width: 1200px;
            margin: 60px auto 0 auto;
            padding: 0 5%;
            text-align: center;
            position: relative;
            z-index: 5;
        }
        .map-header {
            font-family: 'Playfair Display', serif;
            color: var(--gold-bright);
            margin-bottom: 25px;
            font-size: 24px;
        }
        .map-container {
            position: relative;
            width: 100%;
            height: 450px;
            background: #111;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            border: 2px solid #333;
        }
        .map-container::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, var(--gold), transparent 30%);
            animation: spin 6s linear infinite;
            z-index: 0;
        }
