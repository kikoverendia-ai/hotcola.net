<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sweet Cola Wellness Massage Spa – Riyadh</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,sans-serif;
background:#0b0b0b;
color:white;
}

/* HERO BACKGROUND */

.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:60px;
background:
radial-gradient(circle at 20% 20%, rgba(212,162,76,.35), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(212,162,76,.25), transparent 45%),
#000;
}

/* GLASS CONTAINER */

.container{
display:flex;
align-items:center;
gap:60px;
max-width:1200px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(12px);
padding:60px;
border-radius:18px;
}

/* TEXT SIDE */

.text h1{
font-family:"Cormorant Garamond",serif;
font-size:68px;
color:#e6c070;
text-shadow:0 0 25px rgba(230,192,112,.4);
margin-bottom:10px;
}

.text h2{
font-weight:300;
font-size:26px;
margin-bottom:20px;
color:#ddd;
}

.text p{
color:#bbb;
line-height:1.7;
margin-bottom:35px;
}

/* BUTTONS */

.buttons{
display:flex;
gap:16px;
}

.btn{
padding:14px 34px;
border-radius:40px;
font-size:15px;
text-decoration:none;
transition:.3s;
}

.book{
background:#e6c070;
color:black;
}

.call{
border:1px solid #e6c070;
color:#e6c070;
}

.btn:hover{
transform:translateY(-4px);
box-shadow:0 10px 25px rgba(230,192,112,.3);
}

/* IMAGE */

.image img{
width:420px;
max-width:100%;
border-radius:16px;
box-shadow:0 20px 60px rgba(0,0,0,.7);
transition:.4s;
}

.image img:hover{
transform:scale(1.04);
}

/* MOBILE */

@media(max-width:900px){

.container{
flex-direction:column;
text-align:center;
padding:40px;
}

.text h1{
font-size:46px;
}

}

</style>

</head>

<body>

<img src="lotus.png" alt="Sweet Cola Spa Logo" style="width:140px;margin-bottom:20px;">
  
<section class="hero">

<div class="container">

<div class="text">

<h1>Sweet Cola</h1>

<h2>Wellness Massage Spa – Riyadh</h2>

<p>
Relax and refresh your body with professional massage therapy.
Experience Thai, Swedish, Oil Massage and Moroccan Bath in a peaceful luxury spa environment.
</p>

<div class="buttons">

<a class="btn book" href="https://wa.me/966560369386">Book Now</a>

<a class="btn call" href="tel:+966560369386">Call Now</a>

</div>

</div>

<div class="image">

<img src="lotus.jpg" alt="Sweet Cola Spa">

</div>

</div>

</section>

</body>

</html>
