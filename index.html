<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sweet Cola Wellness Massage Spa – Riyadh</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,sans-serif;
background:linear-gradient(135deg,#000000,#c89b3c);
color:white;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* hero card */

.hero{
width:90%;
max-width:900px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border-radius:18px;
padding:50px 40px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

/* logo */

.logo{
width:120px;
display:block;
margin:auto;
margin-bottom:25px;
}

/* title */

h1{
font-size:42px;
color:#f1d48a;
margin-bottom:10px;
}

h2{
font-weight:400;
margin-bottom:20px;
}

p{
color:#ddd;
line-height:1.6;
margin-bottom:30px;
}

/* buttons */

.buttons{
margin-top:20px;
}

.btn{
display:inline-block;
padding:12px 28px;
margin:10px;
border-radius:30px;
text-decoration:none;
font-weight:600;
}

.book{
background:#e0b95a;
color:black;
}

.call{
border:2px solid #e0b95a;
color:#e0b95a;
}

/* mobile */

@media(max-width:600px){

h1{
font-size:32px;
}

.hero{
padding:35px 25px;
}

}

</style>

</head>


<body>

<div class="hero">

<img src="lotus.png" alt="Sweet Cola Spa Logo" class="logo">

<h1>Sweet Cola</h1>

<h2>Wellness Massage Spa – Riyadh</h2>

<p>
Relax and refresh your body with professional massage therapy.  
Experience Thai, Swedish, Oil Massage and Moroccan Bath  
in a peaceful luxury spa environment.
</p>

<div class="buttons">

<a class="btn book" href="https://wa.me/966560369386?text=Hello%20I%20want%20to%20book%20massage">
Book Now
</a>

<a class="btn call" href="tel:+966560369386">
Call Now
</a>

</div>

</div>

</body>

</html>
