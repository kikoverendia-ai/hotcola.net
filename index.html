<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Cola Massage In Riyadh</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* 1. VARIABLES & RESET */
        :root {
            --gold-text: #cca243;
            --yellow-btn: #e6b012;
            --dark-card: #1c1c1c;
            --border-color: #2a2a2a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-image: url('Background_01.jpg');
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            background-repeat: no-repeat;
            background-color: #000; 
            color: #fff;
            overflow: hidden; /* Pinilit sa isang page, bawal mag-scroll */
            height: 100vh;
        }

        /* 2. MAIN LAYOUT */
        .hero { 
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 5%;
            gap: 60px; /* Pinalaki ang space para hindi dikit-dikit */
        }

        /* 3. LOGO CONTAINER (LEFT) - PINALAKI */
        .logo-container {
            flex: 0.8;
            z-index: 3;
            display: flex;
            justify-content: flex-end; /* Iniurong pakaliwa para may space ang box */
        }

        .logo-ring {
            width: 420px; /* PINALAKI MULA 320px */
            height: 420px; /* PINALAKI MULA 320px */
            border-radius: 50%;
            background: #000;
            box-shadow: 0 0 70px 20px rgba(230, 176, 18, 0.25);
            display: flex; 
            align-items: center; 
            justify-content: center;
            padding: 5px;
        }

        .logo-ring img {
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            object-fit: contain;
        }

        /* 4. CONTENT WRAPPER (CENTER) - PINALIIT PARA HINDI TUMAKIP SA MUKHA */
        .content-wrapper {
            flex: 1;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            max-width: 480px; /* PINALIIT MULA 600px */
            margin-right: auto; /* Tinulak palayo sa mukha mo sa kanan */
        }

        /* 5. PREMIUM CARD (DARK SOLID) */
        .premium-card {
            background: var(--dark-card);
            padding: 25px 30px; /* Pinaliit ang padding para bumagay sa maliit na box */
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 25px;
        }

        .premium-card h2 {
            font-family: 'Playfair Display', serif;
            color: var(--gold-text);
            font-size: 24px;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 8px;
        }

        .arabic-text {
            font-family: 'Playfair Display', serif;
            color: var(--gold-text);
            font-size: 18px;
            margin-bottom: 12px;
            display: block;
        }

        .premium-card p {
            color: #a0a0a0;
            font-size: 12px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .btn-book {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: var(--yellow-btn);
            color: #000;
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
            border-radius: 30px;
            transition: 0.3s;
        }

        .btn-book:hover {
            transform: scale(1.05);
            background: #ffc414;
        }

        /* 6. SERVICES SECTION */
        .services-header {
            font-family: 'Playfair Display', serif;
            color: var(--gold-text);
            font-size: 20px;
            margin-bottom: 15px;
            padding-left: 5px;
        }

        .services-grid {
            display: flex;
            gap: 12px;
        }

        .service-card {
            background: #151515;
            padding: 15px 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            flex: 1;
            text-align: center;
            transition: 0.3s;
        }

        .service-card:hover {
            border-color: var(--gold-text);
        }

        .service-card i {
            color: var(--yellow-btn);
            font-size: 18px;
            margin-bottom: 10px;
        }

        .service-card h3 {
            font-size: 11px;
            font-weight: 600;
            color: #e0e0e0;
        }

        /* 7. MODEL OVERLAY (RIGHT) */
        .babae-overlay {
            position: absolute;
            right: 0;
            bottom: 0;
            height: 95vh; /* Siguradong pasok sa screen ang height */
            z-index: 1;
            object-fit: contain;
            pointer-events: none;
        }

        /* 8. RESPONSIVE PARA SA MOBILE */
        @media (max-width: 1024px) {
            body {
                overflow-y: auto; /* Ibabalik ang scroll sa cellphone para magkasya lahat */
            }
            .hero {
                flex-direction: column;
                justify-content: center;
                text-align: center;
                height: auto;
                padding: 50px 5%;
                gap: 30px;
            }
            .logo-ring {
                width: 280px;
                height: 280px;
            }
            .content-wrapper {
                align-items: center;
                max-width: 100%;
                margin: 0;
            }
            .premium-card p {
                margin: 0 auto 20px auto;
            }
            .babae-overlay {
                opacity: 0.2;
                right: -10%;
                height: 80vh;
            }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="logo-container">
            <div class="logo-ring">
                <img src="Logo.png" alt="Sweet Cola Massage Logo">
            </div>
        </div>

        <div class="content-wrapper">
            
            <div class="premium-card">
                <h2>The Premium Package:<br>4-in-1 Luxury Ritual</h2>
                <span class="arabic-text">سويت كولا مساج</span>
                <p>Forget the stress of the city for a moment. Four high-end services seamless session of pure indulgence and aura.</p>
                
                <a href="https://wa.me/966560958973" class="btn-book" target="_blank" rel="noopener noreferrer">
                    <i class="fas fa-hand-pointer"></i> Book Now / احجز الآن
                </a>
            </div>

            <h3 class="services-header">Our Professional Services</h3>
            <div class="services-grid">
                <div class="service-card">
                    <i class="fab fa-pagelines"></i>
                    <h3>Sweet Cola</h3>
                </div>
                <div class="service-card">
                    <i class="fas fa-hands"></i>
                    <h3>Hessy Therapy</h3>
                </div>
                <div class="service-card">
                    <i class="fas fa-leaf"></i>
                    <h3>Ellnit Services</h3>
                </div>
            </div>

        </div>

        <img src="image_16.png" alt="Model Overlay" class="babae-overlay">
    </section>

</body>
</html>
