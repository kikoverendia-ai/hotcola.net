<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Cola Massage In Riyadh</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --gold-text: #cca243;
            --yellow-btn: #e6b012;
            --dark-card: #1c1c1c;
            --border-color: #2a2a2a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-image: url('Background_01.jpg');
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            background-repeat: no-repeat;
            background-color: #000; 
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        .hero { 
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center; /* Vertical center */
            justify-content: flex-start; /* Logo sa kaliwa */
            padding-left: 5%; /* May space sa edge */
            gap: 80px; /* Space sa pagitan ng logo at box */
        }

        /* LOGO LEFT */
        .logo-container {
            z-index: 3;
            flex-shrink: 0;
        }

        .logo-ring {
            width: 380px; 
            height: 380px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            box-shadow: 0 0 70px 20px rgba(230, 176, 18, 0.2);
            display: flex; 
            align-items: center; 
            justify-content: center;
            padding: 5px;
        }

        .logo-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: contain; }

        /* CONTENT CENTER - Shoulder level position */
        .content-wrapper {
            z-index: 3;
            max-width: 450px;
            margin-top: 50px; /* Ibaba ng konti para magpantay sa balikat */
        }

        .premium-card {
            background: var(--dark-card);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 25px;
        }

        .premium-card h2 {
            font-family: 'Playfair Display', serif;
            color: var(--gold-text);
            font-size: 26px;
            margin-bottom: 10px;
        }

        .arabic-text { font-family: 'Playfair Display', serif; color: var(--gold-text); display: block; margin-bottom: 15px; }

        .premium-card p { color: #a0a0a0; font-size: 13px; line-height: 1.5; margin-bottom: 20px; }

        .btn-book {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 25px; background: var(--yellow-btn); color: #000;
            text-decoration: none; font-weight: 700; border-radius: 30px;
            transition: 0.3s;
        }

        /* SERVICES */
        .services-header { font-family: 'Playfair Display', serif; color: var(--gold-text); font-size: 18px; margin-bottom: 15px; }

        .services-grid { display: flex; gap: 15px; }

        .service-card {
            background: #151515; padding: 15px; border-radius: 8px;
            border: 1px solid var(--border-color); flex: 1; text-align: center;
        }

        .service-card i { color: var(--yellow-btn); font-size: 16px; margin-bottom: 8px; display: block; }
        .service-card h3 { font-size: 11px; color: #e0e0e0; }

        /* MODEL RIGHT */
        .babae-overlay {
            position: absolute;
            right: 0;
            bottom: 0;
            height: 90vh; /* Para hindi matakpan ang mukha */
            z-index: 1;
            object-fit: contain;
            pointer-events: none;
        }

        /* MOBILE ADJUSTMENT */
        @media (max-width: 1024px) {
            .hero { flex-direction: column; justify-content: center; text-align: center; padding: 20px; }
            .content-wrapper { margin-top: 0; }
            .babae-overlay { opacity: 0.15; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="logo-container">
            <div class="logo-ring">
                <img src="Logo.png" alt="Sweet Cola Massage Logo">
            </div>
        </div>

        <div class="content-wrapper">
            <div class="premium-card">
                <h2>The Premium Package:<br>4-in-1 Luxury Ritual</h2>
                <span class="arabic-text">سويت كولا مساج</span>
                <p>Forget the stress of the city for a moment. Four high-end services seamless session of pure indulgence and aura.</p>
                <a href="https://wa.me/966560958973" class="btn-book" target="_blank" rel="noopener noreferrer">
                    <i class="fas fa-hand-pointer"></i> Book Now / احجز الآن
                </a>
            </div>

            <h3 class="services-header">Our Professional Services</h3>
            <div class="services-grid">
                <div class="service-card"><i class="fab fa-pagelines"></i><h3>Sweet Cola</h3></div>
                <div class="service-card"><i class="fas fa-hands"></i><h3>Hessy Therapy</h3></div>
                <div class="service-card"><i class="fas fa-leaf"></i><h3>Ellnit Services</h3></div>
            </div>
        </div>

        <img src="image_16.png" alt="Model Overlay" class="babae-overlay">
    </section>

</body>
</html>
