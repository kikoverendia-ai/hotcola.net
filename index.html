<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sweet Cola Wellness Massage Spa – Riyadh</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:black;
color:white;
font-family:Poppins, sans-serif;
}

/* MAIN SECTION */

.hero{
display:flex;
align-items:center;
justify-content:center;
padding:60px 10%;
min-height:100vh;
background:linear-gradient(120deg,#c8962f,#000);
}

/* TEXT SIDE */

.text{
flex:1;
}

.text h1{
font-family:'Playfair Display', serif;
font-size:55px;
color:#ffd36b;
margin-bottom:10px;
}

.text h2{
font-size:28px;
font-weight:300;
margin-bottom:20px;
}

.text p{
font-size:18px;
color:#ddd;
margin-bottom:30px;
}

/* BUTTONS */

.buttons a{
display:inline-block;
padding:14px 30px;
margin-right:15px;
text-decoration:none;
border-radius:30px;
font-weight:500;
transition:0.3s;
}

.book{
background:#ffd36b;
color:black;
}

.call{
background:transparent;
border:2px solid #ffd36b;
color:#ffd36b;
}

.buttons a:hover{
transform:scale(1.05);
}

/* IMAGE SIDE */

.image{
flex:1;
text-align:center;
}

.image img{
max-width:420px;
width:100%;
border-radius:15px;
box-shadow:0 10px 40px rgba(0,0,0,0.7);
}

/* MOBILE */

@media(max-width:900px){

.hero{
flex-direction:column;
text-align:center;
}

.text h1{
font-size:40px;
}

.image{
margin-top:30px;
}

}

</style>

</head>

<body>

<section class="hero">

<div class="text">

<h1>Sweet Cola</h1>

<h2>Wellness Massage Spa – Riyadh</h2>

<p>Relax and refresh your body with professional massage therapy.</p>

<div class="buttons">

<a class="book" href="https://wa.me/966560369386">Book Now</a>

<a class="call" href="tel:+966560369386">Call Now</a>

</div>

</div>

<div class="image">

<img src="lotus.jpg" alt="Sweet Cola Spa">

</div>

</section>

</body>
</html>
