<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sweet Cola Massage Riyadh</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,sans-serif;
background:#f3b500;
}

/* header */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
font-size:18px;
}

header nav a{
margin-left:25px;
text-decoration:none;
color:black;
}

/* hero layout */

.hero{
display:flex;
align-items:center;
justify-content:center;
gap:80px;
padding:80px;
}

/* logo circle */

.logo-circle{
width:420px;
height:420px;
border-radius:50%;
overflow:hidden;
}

.logo-circle img{
width:100%;
height:100%;
object-fit:cover;
}

/* right text */

.hero-text{
max-width:450px;
}

.hero-text h1{
font-family:"Playfair Display",serif;
font-size:42px;
margin-bottom:20px;
}

.hero-text p{
margin-bottom:40px;
line-height:1.6;
}

/* button */

.book-btn{
display:inline-block;
background:black;
color:#f3b500;
padding:22px 120px;
border-radius:40px;
text-decoration:none;
font-size:18px;
}

/* mobile */

@media(max-width:900px){

.hero{
flex-direction:column;
text-align:center;
padding:40px;
}

.logo-circle{
width:300px;
height:300px;
}

}

</style>

</head>

<body>

<header>

<div>Sweet Cola Massage In Riyadh</div>

<nav>
<a href="#">Services</a>
<a href="#">Contact</a>
</nav>

</header>


<section class="hero">

<div class="logo-circle">
<img src="lotus.png">
</div>

<div class="hero-text">

<h1>Empower Your<br>Health Journey</h1>

<p>
Welcome to our health-focused platform, where expert knowledge meets practical application.
Explore research-driven insights and solutions crafted to elevate your well-being.
</p>

<a class="book-btn" href="https://wa.me/966560369386">
Book Now!
</a>

</div>

</section>

</body>
</html>
