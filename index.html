<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Cola Massage | Premium Luxury</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --gold: #d4a017;
            --gold-light: #f2b600;
            --dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; overflow-x: hidden; }

        /* HERO SECTION WITH ATMOSPHERE */
        .hero { 
            position: relative;
            min-height: 100vh;
            background: radial-gradient(circle at 0% 0%, #2a2a00, #000); 
            display: flex;
            align-items: center;
            padding: 5%;
            overflow: hidden;
        }

        /* LOGO CIRCLE GLOW */
        .logo-container { z-index: 2; }
        .logo-circle {
            width: 380px; height: 380px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            padding: 10px;
            box-shadow: 0 0 50px rgba(212, 160, 23, 0.4);
            background: #000;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-circle img { width: 95%; height: 95%; border-radius: 50%; object-fit: cover; }

        /* THE CARD */
        .premium-card {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(212, 160, 23, 0.3);
            max-width: 500px;
            margin-left: 50px;
            z-index: 2;
        }
        .premium-card h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 40px; }
        .premium-card p { color: #ccc; margin: 20px 0; line-height: 1.6; }
        .btn-book {
            display: inline-block; padding: 15px 30px;
            background: var(--gold); color: #000;
            text-decoration: none; font-weight: bold; border-radius: 50px;
            transition: 0.3s;
        }

        /* MODEL IMAGE (Absolute positioned to match reference) */
        .babae-overlay {
            position: absolute; right: 0; bottom: 0;
            height: 90%; z-index: 1;
            mask-image: linear-gradient(to left, black 70%, transparent 100%);
        }

        /* SERVICES GRID */
        .services-section { padding: 50px 5%; background: #050505; }
        .services-grid { display: flex; gap: 20px; margin-top: 20px; }
        .service-card {
            background: #111; padding: 20px; border-radius: 15px;
            border: 1px solid #333; flex: 1; text-align: center;
        }

        /* MAP AREA */
        .map-section { padding: 50px 5%; }
        .map-wrapper { 
            width: 100%; height: 400px; border-radius: 20px; 
            border: 2px solid var(--gold); overflow: hidden;
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="logo-container">
            <div class="logo-circle">
                <img src="Logo.png" alt="Logo">
            </div>
        </div>

        <div class="premium-card">
            <h1>The Premium Package:<br>4-in-1 Luxury Ritual</h1>
            <p>Forget the stress of the city for a moment. Four high-end services, seamless session of pure indulgence.</p>
            <a href="https://wa.me/966560958973" class="btn-book">Book Now / احجز الآن</a>
        </div>

        <img src="image_16.png" class="babae-overlay">
    </section>

    <section class="services-section">
        <h2 style="color:var(--gold); font-family: 'Playfair Display'; margin-bottom: 20px;">Our Professional Services</h2>
        <div class="services-grid">
            <div class="service-card"><i class="fas fa-spa" style="color:var(--gold)"></i><h3 style="margin-top:10px;">Sweet Cola</h3></div>
            <div class="service-card"><i class="fas fa-hands" style="color:var(--gold)"></i><h3 style="margin-top:10px;">Hessy Therapy</h3></div>
            <div class="service-card"><i class="fas fa-star" style="color:var(--gold)"></i><h3 style="margin-top:10px;">Ellnit Services</h3></div>
        </div>
    </section>

    <section class="map-section">
        <div class="map-wrapper">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3621.8507261352424!2d46.7866557!3d24.8005645!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3e2effd68e538899%3A0xa53e0f232c0028b0!2sSweet+Cola+Massage" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </section>

</body>
</html>
