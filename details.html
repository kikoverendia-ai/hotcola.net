<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmation | Sweet Cola Spa</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f2b600; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

        .service-page {
            background: #fff;
            width: 100%;
            max-width: 500px;
            padding: 40px 30px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            border: 6px solid #fff;
            position: relative;
        }

        .icon-circle {
            width: 80px; height: 80px; background: #f2b600; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; font-size: 35px; color: #000;
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 36px; color: #000; margin-bottom: 5px; }
        .arabic-title { font-size: 28px; color: #d4a017; font-weight: 700; display: block; margin-bottom: 25px; }

        .details-container { background: #fafafa; padding: 25px; border-radius: 20px; margin-bottom: 25px; border: 1px solid #eee; }
        .desc-en { font-size: 16px; line-height: 1.6; color: #333; margin-bottom: 10px; }
        .desc-ar { font-size: 18px; line-height: 1.6; color: #666; direction: rtl; }

        .info-row { display: flex; justify-content: space-around; margin-bottom: 25px; background: #000; padding: 15px; border-radius: 15px; color: #f2b600; }
        .info-item b { display: block; font-size: 20px; color: #fff; }
        .info-item span { font-size: 14px; text-transform: uppercase; }

        .terms { font-size: 12px; color: #999; margin-bottom: 30px; font-style: italic; line-height: 1.4; }

        .book-now-btn {
            background: #25d366; color: #fff; width: 100%; padding: 22px;
            border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 20px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
        }

        .back-link { display: inline-block; margin-top: 25px; color: #000; text-decoration: none; font-size: 14px; font-weight: 600; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="service-page">
        <div class="icon-circle" id="service-icon"><i class="fas fa-spa"></i></div>
        <h1 id="en-name">Loading...</h1>
        <span class="arabic-title" id="ar-name">...</span>

        <div class="details-container">
            <p class="desc-en" id="en-desc"></p>
            <p class="desc-ar" id="ar-desc"></p>
        </div>

        <div class="info-row">
            <div class="info-item"><span>Price / السعر</span><b id="price-val">150 SR</b></div>
            <div class="info-item"><span>Time / الوقت</span><b id="time-val">40 MINS</b></div>
        </div>

        <p class="terms">
            * Discount will apply. Terms and conditions apply.<br>
            * سيتم تطبيق الخصم. تطبق الشروط والأحكام.
        </p>

        <a href="#" id="whatsapp-btn" class="book-now-btn"><i class="fab fa-whatsapp"></i> YOU WANT TO BOOK NOW?</a>
        <a href="index.html" class="back-link">← Return to Menu</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const serviceKey = params.get('service');
        const phone = "966560958973";

        const serviceData = {
            thai: {
                en: "Thai Massage", ar: "مساج تايلاندي",
                enD: "Traditional deep stretch therapy to improve flexibility and blood flow.",
                arD: "العلاج التقليدي للتمدد العميق لتحسين المرونة وتدفق الدم.",
                price: "150 SR", time: "40 MINS", icon: "fa-hands-holding",
                msg: "I want to book Thai Massage 150 40mins"
            },
            swedish: {
                en: "Swedish Massage", ar: "مساج سويدي",
                enD: "Gentle long strokes for stress relief and total body relaxation.",
                arD: "ضربات طويلة لطيفة لتخفيف التوتر والاسترخاء التام للجسم.",
                price: "150 SR", time: "40 MINS", icon: "fa-spa",
                msg: "I want to book Swedish Massage 150 40mins"
            },
            oil: {
                en: "Oil Massage", ar: "مساج بالزيت",
                enD: "Full body massage using premium oils to nourish the skin.",
                arD: "تدليك كامل للجسم باستخدام زيوت فاخرة لتغذية البشرة.",
                price: "150 SR", time: "40 MINS", icon: "fa-droplet",
                msg: "I want to book Oil Massage 150 40mins"
            },
            moroccan: {
                en: "Moroccan Bath", ar: "حمام مغربي",
                enD: "Deep skin cleansing to remove toxins and dead skin cells.",
                arD: "تنظيف عميق للبشرة لإزالة السموم وخلايا الجلد الميتة.",
                price: "150 SR", time: "40 MINS", icon: "fa-bath",
                msg: "I want to book Moroccan Bath 150 40mins"
            },
            premium: {
                en: "Premium Package", ar: "باقة بريميوم",
                enD: "Luxury: Moroccan Bath, Hot Stone Massage, Mani & Pedi.",
                arD: "فخامة: حمام مغربي، مساج بالأحجار الساخنة، منيكير وبديكير.",
                price: "450 SR", time: "150 MINS", icon: "fa-crown",
                msg: "I want to book Premium Package 450 SR"
            }
        };

        if(serviceData[serviceKey]) {
            const s = serviceData[serviceKey];
            document.getElementById('en-name').innerText = s.en;
            document.getElementById('ar-name').innerText = s.ar;
            document.getElementById('en-desc').innerText = s.enD;
            document.getElementById('ar-desc').innerText = s.arD;
            document.getElementById('price-val').innerText = s.price;
            document.getElementById('time-val').innerText = s.time;
            document.getElementById('service-icon').innerHTML = `<i class="fas ${s.icon}"></i>`;
            document.getElementById('whatsapp-btn').href = "https://wa.me/" + phone + "?text=" + encodeURIComponent(s.msg);
        }
    </script>
</body>
</html>
